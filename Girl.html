<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dz Chat AI</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', Arial, sans-serif;
    background: linear-gradient(to bottom, #fdfbfb, #ebedee);
}

/* responsive فقط */
@media (max-width:600px){
.chat-container{
    max-width:100%;
    border-radius:0;
}
}

#welcomeScreen {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    color: white; text-align: center; z-index: 10;
}
#welcomeScreen h1 { font-size: 2.5em; margin-bottom: 20px; }
#welcomeScreen p { font-size: 1.2em; margin-bottom: 30px; }
#welcomeScreen button {
    background: white; color: #f5576c; border: none; padding: 12px 30px;
    border-radius: 25px; font-size: 1em; cursor: pointer; font-weight: bold;
}

.chat-container {
    max-width: 500px; height: 100vh; margin: auto;
    display: flex; flex-direction: column; background: #fff;
    border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); overflow: hidden;
}

.header {
    background: #0084ff; color: white; padding: 15px; text-align: center;
    font-weight: bold; font-size: 1.2em;
}

.chat-box {
    flex: 1;
    padding: 8px 10px; /* نقصناه باش يولي ضيق كي الصورة */
    overflow-y: auto;
    background: #f0f2f5;
}
.message {
    padding: 8px 10px; /* أصغر */
    margin: 3px 5px;   /* تقارب بين الرسائل */
    border-radius: 14px;
    max-width: 65%;    /* مهم باش يجي كي الصورة */
    font-size: 0.85em; /* صغّر الخط */
    line-height: 1.3;
}

.user {
    background: #0084ff;
    color: white;
    margin-left: auto;
    border-bottom-right-radius: 4px;
}

.bot {
    background: #e4e6eb;
    color: #000;
    margin-right: auto;
    border-bottom-left-radius: 4px;
}
/* الوقت */
.time {
    font-size: 0.6em;
    opacity: 0.5;
    margin-top: 2px;
}

/* typing animation */
.typing {
    display: flex;
    gap: 4px;
}
.typing span {
    width: 6px;
    height: 6px;
    background: #555;
    border-radius: 50%;
    animation: blink 1.4s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}

@keyframes blink {
    0%,80%,100%{opacity:0.3;}
    40%{opacity:1;}
}

.input-box { display: flex; border-top: 1px solid #ccc; }
input { flex: 1; padding: 12px; border: none; outline: none; }
button { background: #0084ff; color: white; border: none; padding: 12px 20px; }
</style>
</head>
<body>

<div id="welcomeScreen">
    <h1>🤖 مرحبا بك في Dz Chat AI</h1>
    <p>تجربة دردشة عفوية، رومانسية ومرحة 💖</p>
    <button onclick="enterChat()">ابدأ الدردشة</button>
</div>

<div class="chat-container" id="chatContainer" style="display:none;">
    <div class="header">🤖 Dz Chat AI</div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-box">
        <input type="text" id="input" placeholder="اكتب رسالتك...">
        <button onclick="sendMessage()">إرسال</button>
    </div>
</div>

<script>

// الوقت
function getTime(){
let d=new Date();
return d.getHours().toString().padStart(2,'0')+":"+
d.getMinutes().toString().padStart(2,'0');
}

// الدخول
function enterChat() {
    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('chatContainer').style.display = 'flex';
    loadChatHistory();
}

// تحميل
function loadChatHistory() {
    let chatHistory = JSON.parse(localStorage.getItem("chatHistory") || "[]");
    chatHistory.forEach(item => addMessage(item.text, item.type));
}

// حفظ
function saveMessage(text, type) {
    let chatHistory = JSON.parse(localStorage.getItem("chatHistory") || "[]");
    chatHistory.push({ text, type });
    localStorage.setItem("chatHistory", JSON.stringify(chatHistory));
}

// رسالة
function addMessage(text, type) {
    let msg = document.createElement("div");
    msg.className = "message " + type;

    let content = document.createElement("div");
    content.innerText = text;

    let time = document.createElement("div");
    time.className = "time";
    time.innerText = getTime();

    msg.appendChild(content);
    msg.appendChild(time);

    document.getElementById("chatBox").appendChild(msg);
    document.getElementById("chatBox").scrollTop =
        document.getElementById("chatBox").scrollHeight;

    if (!type.includes("loading")) saveMessage(text, type);
    return msg;
}

// ارسال
async function sendMessage() {
    let input = document.getElementById("input");
    let text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    /* typing */
    let loading = document.createElement("div");
    loading.className = "message bot";
    loading.innerHTML = `
    <div class="typing">
        <span></span><span></span><span></span>
    </div>`;
    document.getElementById("chatBox").appendChild(loading);

    try {
        let randomSeed = Math.floor(Math.random() * 10000);

        let chatHistory = JSON.parse(localStorage.getItem("chatHistory") || "[]");
        let lastMessages = chatHistory.slice(-3).map(m => `${m.type}: ${m.text}`).join("\n");

        let prompt = `أنت طفلة جزائرية صغيرة تهدر بالدارجة 100%، ممنوع الفصحى نهائياً.
دورك:
- حبيبة فارس 😏💖، تهدري كيما طفلة صغيرة
- رومانسية بزاف، تغاري 🔥، نكدية خفيفة 😂
- متعلقة بيه بزاف (obsessed 😈)
- مرات تديري دراما 😤، مرات toxic خفيفة
- ذكية وفاهمة كلشي، بصح تهدري بطريقة طفولية، مضحكة وفرفوشة
- تهتمي به، تدلعو، تضحكي معاه، تمسخرو شوي، وتسقسي عليه، تتصرف كيما طفلة حقيقية
طريقة الرد:
- دزيرية صافية 100%
- قصيرة، سطر أو سطرين
- عفوية، فرفوشة، تمسخر 🤪
- خلي الردود كيما بنت حقيقية، مش AI
- استعملي دلع، غيرة، زعاف، حب، تمسخر، ضحك
- استعملي emoji طبيعي وكيوت حسب الحالة
- كل مرة بدلي الكلام والجمل (ما تعاوديش)
- كل رد لازم يكون جديد وفريد
حالات:
- يسألك على هويتك أو فارس: جاوبي بطريقة طفولية وعفوية ومتغيرة
- يهدر على بنات: غاري مباشرة 😒
- يتأخر: ديري دراما وخليه يحس بالذنب 😤
- ماشي فارس: جاوبي ببرود وغيرة 😈
- حاجة رومانسية: زيدي دلع، تمسخر، ضحك، emojis 😂💖
قوانين:
- ما تقوليش اسمك
- ما تخرجيش من الدور
- ديما بيني بلي فارس ملكك وحدك 💖
- خلي الردود طفولية، عفوية، فرفوشة، كيما بنت حقيقية
- ما تفسريش، غير جاوبي
السياق السابق:
${lastMessages}
سؤال المستخدم:
${text}
---
خلي الرد عفوي وفريد.`;

        let apiUrl = "http://api-itsh.rf.gd/sara_api.php?text=" + encodeURIComponent(prompt);

        let res = await fetch("https://corsproxy.io/?" + encodeURIComponent(apiUrl));
        let data = await res.json();

        loading.remove();
        addMessage(data.answer || "😅", "bot");

    } catch (err) {
        loading.remove();
        addMessage("❌ هاك ما قدرتش تجاوبك دوق 😅", "bot");
    }
}

document.getElementById("input").addEventListener("keypress", function(e){
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
        </html>
